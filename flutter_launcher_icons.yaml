flutter_launcher_icons:
  image_path: "assets/icons/gymplyIcon.png"
  android: true
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/gymplyIcon.png"
  adaptive_icon_foreground_inset: 16
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#000000"
  web:
    generate: true
    image_path: "assets/icons/gymplyIcon.png"
    background_color: "#000000"
    theme_color: "#000000"
  windows:
    generate: true
    image_path: "assets/icons/gymplyIcon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/gymplyIcon.png"
