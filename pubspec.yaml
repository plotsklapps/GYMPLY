name: gymply
description: "GYMPLY. The SIMPLE gym tracker."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.0.4+41

environment:
  sdk: ^3.11.0

dependencies:
  archive: ^4.0.9
  audioplayers: ^6.5.1
  cupertino_icons: ^1.0.8
  device_info_plus: ^12.3.0
  file_picker: ^10.3.10
  flex_color_scheme: ^8.4.0
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  image_picker: ^1.2.1
  intl: ^0.20.2
  logger: ^2.6.2
  lucide_icons_flutter: ^3.1.10
  ndk: ^0.7.1
  open_filex: ^4.7.0
  package_info_plus: ^9.0.0
  path: ^1.9.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  share_plus: ^12.0.1
  signals: ^6.3.0
  toastification: ^3.0.3
  url_launcher: ^6.3.1
  uuid: ^4.5.3
  wakelock_plus: ^1.4.0

dev_dependencies:
  build_runner: ^2.11.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_test:
    sdk: flutter
  hive_ce_generator: ^1.11.1
  very_good_analysis: ^10.2.0

flutter_native_splash:
  # dart run flutter_native_splash:create
  color: "#000000"
  color_dark: "#000000"
  image: assets/icons/gymplyIcon.png
  android_gravity: center
  ios_content_mode: center
  web_image_mode: center
  android_screen_orientation: sensorPortrait
  fullscreen: true
  # ANDROID 12+ configuration:
  android_12:
    # background color
    color: "#000000"
    color_dark: "#000000"
    image: assets/icons/gymplyIcon.png
    image_dark: assets/icons/gymplyIcon.png
    icon_background_color: "#000000"
    icon_background_color_dark: "#000000"

flutter:

  uses-material-design: true

  assets:
    - assets/
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/images/musclegroups/
    - assets/images/equipment/
    - assets/images/exercises/
    - assets/sounds/

  fonts:
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/bebasneue.ttf
    - family: LeagueGothic
      fonts:
        - asset: assets/fonts/leaguegothic.ttf
