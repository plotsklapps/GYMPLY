name: gymply
description: "GYMPLY. Lift. Log. Load."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.0.1+4

environment:
  sdk: ^3.11.0

dependencies:
  audioplayers: ^6.5.1
  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  flex_color_scheme: ^8.4.0
  flutter:
    sdk: flutter
  font_awesome_flutter: ^10.12.0
  hive_ce_flutter: ^2.3.4
  intl: ^0.20.2
  logger: ^2.6.2
  signals: ^6.3.0

  toastification: ^3.0.3
  uuid: any
  wakelock_plus: ^1.4.0
  web: ^1.1.1
dev_dependencies:
  build_runner: ^2.11.1
  flutter_test:
    sdk: flutter
  hive_ce_generator: ^1.11.1
  very_good_analysis: ^10.2.0

flutter:

  uses-material-design: true

  assets:
    - assets/
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/images/musclegroups/
    - assets/images/equipment/
    - assets/images/exercises/
    - assets/sounds/

  fonts:
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/bebasneue.ttf
    - family: LeagueGothic
      fonts:
        - asset: assets/fonts/leaguegothic.ttf
