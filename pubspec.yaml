name: gymply
description: "GYMPLY. Lift. Log. Load."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.0.3+24

environment:
  sdk: ^3.11.0

dependencies:
  archive: ^4.0.9
  audioplayers: ^6.5.1
  cupertino_icons: ^1.0.8
  device_info_plus: ^12.3.0
  file_picker: ^10.3.10
  flex_color_scheme: ^8.4.0
  flutter:
    sdk: flutter
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  intl: ^0.20.2
  logger: ^2.6.2
  lucide_icons_flutter: ^3.1.10
  open_filex: ^4.7.0
  package_info_plus: ^9.0.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  signals: ^6.3.0
  toastification: ^3.0.3
  url_launcher: ^6.3.1
  uuid: ^4.5.3
  wakelock_plus: ^1.4.0

dev_dependencies:
  build_runner: ^2.11.1
  flutter_test:
    sdk: flutter
  hive_ce_generator: ^1.11.1
  very_good_analysis: ^10.2.0

flutter:

  uses-material-design: true

  assets:
    - assets/
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/images/musclegroups/
    - assets/images/equipment/
    - assets/images/exercises/
    - assets/sounds/

  fonts:
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/bebasneue.ttf
    - family: LeagueGothic
      fonts:
        - asset: assets/fonts/leaguegothic.ttf
